<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>
    {% include navbar.html %}

    <main>
      {% unless page.no_banner %}
        {% include header.html %}
      {% endunless %}

      <div class="container content{% if page.no_banner %} pt-4{% endif %}">

        {{ content
          | replace: '<table', '<div class="table-responsive"><table'
          | replace: '</table>', '</table></div>'
          | replace: '<table>', '<table class="table">'
        }}

      </div>
    </main>

    {% include footer.html %}

  </body>
</html>
