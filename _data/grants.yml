#   project_number    E.g. "1360424"
#   program           Funder's program (e.g. "Hatch", "AFRI", "INFEWS")
#   role              "PI", "Co-PI", "Project Director", etc. (omit if PI / sole)
#   collaborators     Free-form text (e.g. "with 7 co-PIs at 3 other institutions")
#   amount_total      Total award in USD (number, no commas)
#   amount_managed    Portion managed by AOB
#   amount_approx     true when amounts are approximate (e.g. "approx. $500,000")
#   year_end          Omit for ongoing
#   url               Project page / press release
#   cv                Set false to omit from the CV

