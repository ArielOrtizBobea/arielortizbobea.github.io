# Graduate students and postdocs data file
#
# Used to render the CV's "Graduate Students" section. The website's
# /people page is generated from _data/team.yml independently — this file
# is the authoritative academic-advising record for the CV.
#
# Required fields:  name, level
# Optional fields:
#   field            E.g. "Applied Economics", "Natural Resources"
#   chair_role       chair | co_chair | committee     (PhD / MS only)
#   year_start       For ongoing students
#   year_end         Year of completion (omit if current)
#   placement        First placement after completion
#   note             E.g. "second-place winner, ICPSR 2018 ..."
#   cv               Set false to omit from the CV
#
# `level` values:  postdoc, phd, ms
#
# Order: current students first (no year_end), then completed newest first.

