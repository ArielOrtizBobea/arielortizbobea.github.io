- name: Yurou He
  role: PhD candidate, Applied Economics and Management # Will appear next to name
  image: assets/images/people/yh878.png
  description: >
    Yurou He is a Ph.D. candidate at the Charles H. Dyson School of Applied Economics and Management. She studies the impacts 
    of climate change and adaptation strategies, with a focus on human economic behavior in response to environmental challenges. 
    Her research centers on designing incentive structures in land assembly to ensure that strategies for climate-driven 
    land use changes and displacement are both economically viable and socially just. Yurou aims to provide policymakers 
    with actionable insights to improve the efficiency and equity of policies for land conservation and the relocation of 
    vulnerable communities. She plans to be on the job market in the late Fall of 2026.
  email: yh878@cornell.edu
  googlescholar: 4Po6Kv4AAAAJ&hl
  orcid: 000-0001-9227-6829
  linkedin: yurouhe
  personal_page: https://sites.google.com/view/yurouhe/

- name: Jerzy Jaromczyk
  role: PhD candidate, Applied Economics and Management # Will appear next to name
  image: assets/images/people/jj443.jpg
  description: >
    Jerzy Jaromczyk is a Ph.D. candidate in Applied Economics and Management at Cornell University interested in researching 
    questions in agricultural and environmental economics, and agricultural finance. Prior to his doctoral studies, Jerzy 
    co-directed an agricultural extension education program that served New York State farmers and worked as an analyst at 
