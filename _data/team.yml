- name: Ariel Ortiz-Bobea
  role: Associate Professor
  image: assets/theme/images/people/ao332.jpg
  description: >
    Prof. Ortiz-Bobea is an applied economist with interests in agricultural, environmental and development
    economics. His recent research quantifies the impacts of climate change on agriculture and other sectors using 
    econometric techniques. He joined Cornell in 2014 after a brief stint at Resources for the Future. Prior to graduate school he 
    served as Special Assistant to the Minister of the Environment of the Dominican Republic. He obtained a PhD in Agricultural 
    and Resource Economics from the University of Maryland, an MPA from Syracuse University (Maxwell) and a *Diplôme d'Ingénieur* 
    from the Institut National Agronomique Paris-Grignon (now AgroParisTech, Université Paris-Saclay) in France.
  email: ao332@cornell.edu
  googlescholar: MALB7wEAAAAJ
  linkedin: ariel-ortiz-bobea-a904637
  bluesky: arielob.bsky.social
