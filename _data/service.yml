# Service data file
#
# Used for the CV's "Service" section. Entries are grouped at render time
# by the `kind` field, in this order:
#   department, university, faculty_senate, external, editorial
#
# Required fields:  role, kind
# Optional fields:
#   institution       E.g. "Cornell University", "OECD"
#   group             Sub-organization (e.g. "Office of Faculty Development and Diversity")
#   journal           For editorial entries
#   year_start        Year service began
#   year_end          Omit if ongoing (or set `current: true`)
#   current           true for ongoing service
#   note              Free-form ("prematurely terminated in 2025", "3-year term", etc.)
#
# `kind` values:
#   department       Dyson / AEM department-level service
#   university       Cornell-wide service (not Faculty Senate)
#   faculty_senate   Faculty Senate roles
#   external         Outside-Cornell professional service
#   editorial        Editorial boards, deputy editorships, etc.

