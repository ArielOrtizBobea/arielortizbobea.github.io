# News / press coverage data file
#
# Rendered on /news/:
#   - All entries, sorted by date (newest first).
#
# Rendered on the home page ("In the news" grid):
#   - Entries where featured_home: true, sorted by date (newest first),
#     limited to 4 tiles.
#
# ----- WORKFLOW ---------------------------------------------------------
#   1. When new coverage appears, add an entry anywhere in this file
#      (sort order is computed at render time).
#   2. Set featured_home: true on the (up to 4) items you want on the
#      home page. Flip older ones to false to keep them in the archive
#      but off the landing page.
#   3. Commit + push. GitHub Pages rebuilds automatically.
#
# ----- FIELDS -----------------------------------------------------------
#   Required: title, url, date, image
#   Optional:
#     outlet          Publication / outlet name (e.g. "New York Times")
#     description     Short blurb shown on the /news/ page (1–2 sentences)
#     featured_home   true -> item appears in the home "In the news" tiles
#
# Date format: YYYY-MM-DD.
# URLs with query strings (`?` or `&`) MUST be wrapped in double quotes.

# ======================== ENTRIES ========================

