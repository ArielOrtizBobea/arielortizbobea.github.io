# Talks data file
#
# Entries are rendered on /talks/ (and later a teaser on the home page) by
# filtering on date. No need to manually split "upcoming" vs "recent" — the
# template computes that from the `date` field at build time.
#
# Required fields:  title, presenter, date, venue, location
# Optional fields:  date_end (multi-day conferences), paper (URL), thumbnail (path)
#
# Notes:
# - `presenter` must match a `name` in _data/team.yml for the avatar to show.
# - `date` is always the first day (YYYY-MM-DD); add `date_end` only when the
#   conference spans multiple days.
# - `venue` + `location` together are the grouping key. Keep them identical
#   across entries that share a conference, or "group by event" will split them.

