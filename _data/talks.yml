# Talks data file
#
# This file is the single source of truth for talks on both the website
# (/talks page) and the CV. The website filters to the past 12 months and
# upcoming entries; the CV renders the full history. No flag is needed to
# distinguish "live" vs "archived" — the date filter handles it.
#
# Required fields:  presenter, date, venue
# Optional fields:
#   title          The talk / paper / panel title. Omit for archived seminar
#                  visits where the CV only shows venue + location + date.
#   date_end       For multi-day conferences (YYYY-MM-DD).
#   date_approx    true when only the month or season is known. The `date`
#                  is set to a representative day (1st of the month / season).
#   location       City, State/Country. Omit only when truly unknown.
#   paper          URL to the paper, if available.
#   thumbnail      Path to an event image.
#   non_research   true for panels, fireside chats, policy talks, etc.
#                  Defaults to false (research talk).
#   format         "poster" for posters. Omit for standard paper presentations.
#   role           "panelist", "speaker", "discussant", etc. Omit if presenter.
#   with           Co-presenter ("with Richard E. Just").
#   note           Free-form context ("postponed due to COVID-19", etc.).
#   cv             Set false to omit from the CV.
#
# Notes:
# - `presenter` must match a `name` in _data/team.yml for the avatar to show.
# - `date` is always the first day (YYYY-MM-DD); add `date_end` only when the
#   conference spans multiple days.
# - `venue` + `location` together are the grouping key. Keep them identical
#   across entries that share a conference, or "group by event" will split them.
# - CV-filter is: presenter matches AOB (name or aliases in team.yml).
#   Group-member-presented talks appear on the website but not on the CV.

# Talks are chronological (top one is further in the future, low one further in the past irrespective of present)

