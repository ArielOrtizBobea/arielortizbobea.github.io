# Referee activity and external review data file
#
# Captures the "Referee activities", "Invited editor" and
# "External reviews, grant & panel reviews" lines on the CV.
#
# Sections:
#   journals          Journals where AOB has served as a referee (alphabetical)
#   invited_editor    Journals where AOB has served as invited editor
#   panels            Grant panel / external review service
#                     Each entry: { funder, program, year (or years: [...]) }
#
# Membership in professional organizations is a separate section on the CV;
# kept here so the whole "Professional Organizations" block lives together.

