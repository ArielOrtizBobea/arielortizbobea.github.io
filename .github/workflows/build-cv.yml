name: Build CV PDF

# Rebuild the CV PDF whenever the data files or the build pipeline
# change. The freshly built PDF is committed back to the repo so the
# website link (/assets/cv.pdf) stays in sync without a manual run.
on:
  push:
    branches: [main]
    paths:
      - '_data/**'
      - 'cv/build_cv.R'
      - 'cv/cv.tex'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R packages
        run: install.packages(c('yaml', 'tinytex'), repos = 'https://cloud.r-project.org')
        shell: Rscript {0}

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install LaTeX packages used by cv.tex
        # Install only packages NOT already bundled in TinyTeX baseline.
        # tabularx, colortbl, hyperref, xcolor, etc. ship as part of the
        # default install. set +e so a typo in one name doesn't abort the
        # whole step — tinytex auto-installs anything missing at compile time.
        shell: bash
        run: |
          set +e
          tlmgr update --self
          tlmgr install \
            libertinus libertinus-otf libertinus-type1 \
            lastpage needspace fancyhdr enumitem
          true  # always succeed; let pdflatex auto-install anything else

      - name: Build CV
        run: Rscript cv/build_cv.R

      - name: Commit updated PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cv.pdf assets/cv-archive/ cv/output/
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "auto-build CV PDF [skip ci]"
            git push
          fi
